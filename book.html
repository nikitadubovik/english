<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambridge English — Select Test</title>
<link rel="stylesheet" href="css/base.css">
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-logo">CAMBRIDGE<small>English</small></div>
  </div>
</div>

<div class="menu-container">
  <div class="breadcrumb">
    <a href="index.html">Library</a>
    <span class="sep">›</span>
    <span id="bookTitle">Book</span>
  </div>

  <h1 id="pageTitle">Select a test</h1>
  <p class="subtitle">Pick any of the four tests in this book.</p>

  <div class="menu-grid" id="testGrid"></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const book = params.get('book') || 'cae1';

  const BOOKS = {
    cae1: { title: 'Cambridge English Advanced 1', tests: 4 },
    cae2: { title: 'Cambridge English Advanced 2', tests: 4 },
    cae3: { title: 'Cambridge English Advanced 3', tests: 4 },
    cae4: { title: 'Cambridge English Advanced 4', tests: 4 },
    cae5: { title: 'Cambridge English Advanced 5', tests: 4 },
  };

  // FIX 1: Define info so the script knows how many tests exist
  const info = BOOKS[book] || { title: 'Unknown book', tests: 4 };

  // FIX 2: Restore the titles so the user knows which book they opened
  document.getElementById('bookTitle').textContent = info.title;
  document.getElementById('pageTitle').textContent = info.title;

  const grid = document.getElementById('testGrid');

  // FIX 3: Improved Logic for test numbering (Works for all books)
  // Extract the number from 'cae2' -> 2
  const bookNum = parseInt(book.replace('cae', '')); 
  // Calculate start (e.g., Book 2: (2-1)*4 + 1 = 5)
  const startNum = ((bookNum - 1) * 4) + 1;
  const endNum = startNum + (info.tests - 1);
  
  for (let i = startNum; i <= endNum; i++) {
    const card = document.createElement('a');
    card.className = 'menu-card';
    card.href = `test.html?book=${book}&test=${i}`;
    
    card.innerHTML = `
      <span class="card-label">Test ${i}</span>
      <span class="card-title">Practice Test ${i}</span>
    `;
    grid.appendChild(card);
  }
</script>

</body>
</html>
